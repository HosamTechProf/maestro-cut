# =============================================================================
# Docker Compose — NLE Video Editor Build
# =============================================================================
# Usage:
#   docker compose -f docker-compose.yml build
#   docker compose -f docker-compose.yml run --rm builder
# Artifacts will be copied to ./build-output/
# =============================================================================

services:
  builder:
    build:
      context: .
      dockerfile: Dockerfile.build
    volumes:
      - ./build-output:/output
    command: >
      sh -c "cp -r /artifacts/* /output/ && echo 'Build artifacts copied to ./build-output/'"
    environment:
      - NODE_ENV=production
